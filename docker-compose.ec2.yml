services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:///./data/procureos.db
      SECRET_KEY: ${SECRET_KEY}
      FRONTEND_URL: ${APP_ORIGIN}
      CORS_ORIGINS: ${APP_ORIGIN}
    volumes:
      - backend_data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      - frontend
      - backend
    environment:
      APP_HOST: ${APP_HOST}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/ec2/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  backend_data:
  caddy_data:
  caddy_config:
