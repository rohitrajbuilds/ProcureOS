version: 1.0
runtime: python311

build:
  commands:
    build:
      - pip3 install -r requirements.txt

run:
  runtime-version: 3.11
  command: python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
  env:
    - name: FRONTEND_URL
      value: "https://example.amplifyapp.com"
    - name: CORS_ORIGINS
      value: "https://example.amplifyapp.com"
